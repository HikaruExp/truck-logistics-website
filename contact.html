<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">

  <title>Contact Us — Truck Logistics Georgia</title>
  <meta name="description" content="Get in touch with Truck Logistics Georgia. Call +995 551 624 266 or email trucklogisticsgeorgia@gmail.com. Visit us at 1 Viktor Nozadze Street, Tbilisi, Georgia.">
  <link rel="canonical" href="https://trucklog.ge/contact.html">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://trucklog.ge/contact.html">
  <meta property="og:title" content="Contact Us — Truck Logistics Georgia">
  <meta property="og:description" content="Contact Truck Logistics Georgia for logistics and transportation services. Phone: +995 551 624 266.">
  <meta property="og:image" content="https://trucklog.ge/logo.jpeg">
  <meta property="og:site_name" content="Truck Logistics Georgia">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contact Us — Truck Logistics Georgia">
  <meta name="twitter:description" content="Get in touch with us for logistics solutions.">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {"@type": "ListItem", "position": 1, "name": "Home", "item": "https://trucklog.ge/"},
      {"@type": "ListItem", "position": 2, "name": "Contact", "item": "https://trucklog.ge/contact.html"}
    ]
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ContactPage",
    "name": "Contact Truck Logistics Georgia",
    "url": "https://trucklog.ge/contact.html",
    "mainEntity": {
      "@type": "Organization",
      "name": "Truck Logistics Georgia",
      "telephone": "+995-551-624-266",
      "email": "trucklogisticsgeorgia@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "1 Viktor Nozadze Street",
        "addressLocality": "Tbilisi",
        "addressCountry": "GE"
      }
    }
  }
  </script>

  <link rel="icon" type="image/jpeg" href="/logo.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Georgian:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/style.css">
</head>
<body>
  <header id="site-header" role="banner"></header>

  <main id="main-content">
    <!-- Page Hero -->
    <section class="page-hero" aria-label="Contact page heading">
      <div class="page-hero-pattern" aria-hidden="true"></div>
      <div class="page-hero-content">
        <h1 class="page-hero-title" data-i18n="contact.pageTitle">Contact Us</h1>
        <p class="section-subtitle" style="color: rgba(248,249,250,0.6); animation: heroFadeUp 0.8s 0.15s cubic-bezier(0.16,1,0.3,1) forwards; opacity:0; transform:translateY(20px);" data-i18n="contact.subtitle">Get in touch with our team</p>
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="/" data-i18n="contact.breadcrumbHome">Home</a>
          <span class="breadcrumb-separator" aria-hidden="true">›</span>
          <span data-i18n="contact.pageTitle">Contact Us</span>
        </nav>
      </div>
    </section>

    <!-- Contact Section -->
    <section class="contact-section" id="contact-main" aria-label="Contact form and information">
      <div class="container">
        <div class="contact-grid">
          <!-- Contact Form -->
          <div class="reveal">
            <form class="contact-form" id="contact-form" novalidate>
              <div class="form-row">
                <div class="form-group">
                  <label for="contact-name" data-i18n="contact.formName">Full Name</label>
                  <input type="text" id="contact-name" name="name" required data-i18n-placeholder="contact.formName" placeholder="Full Name" autocomplete="name">
                </div>
                <div class="form-group">
                  <label for="contact-email" data-i18n="contact.formEmail">Email Address</label>
                  <input type="email" id="contact-email" name="email" required data-i18n-placeholder="contact.formEmail" placeholder="Email Address" autocomplete="email">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="contact-phone" data-i18n="contact.formPhone">Phone Number</label>
                  <input type="tel" id="contact-phone" name="phone" data-i18n-placeholder="contact.formPhone" placeholder="Phone Number" autocomplete="tel">
                </div>
                <div class="form-group">
                  <label for="contact-subject" data-i18n="contact.formSubject">Subject</label>
                  <input type="text" id="contact-subject" name="subject" data-i18n-placeholder="contact.formSubject" placeholder="Subject">
                </div>
              </div>
              <div class="form-group">
                <label for="contact-message" data-i18n="contact.formMessage">Your Message</label>
                <textarea id="contact-message" name="message" rows="5" required data-i18n-placeholder="contact.formMessage" placeholder="Your Message"></textarea>
              </div>
              <button type="submit" class="btn btn-primary" id="contact-submit" data-i18n="contact.formSubmit">Send Message</button>
              <div class="form-success" id="form-success" data-i18n="contact.formSuccess" role="alert">Thank you! Your message has been sent.</div>
            </form>
          </div>

          <!-- Contact Info -->
          <div class="contact-info reveal reveal-d2">
            <div class="contact-info-header">
              <h2 data-i18n="contact.infoTitle">Contact Information</h2>
              <p data-i18n="contact.infoSubtitle">We'd love to hear from you</p>
            </div>

            <div class="contact-info-cards">
              <div class="contact-info-card" id="info-phone">
                <div class="contact-info-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                </div>
                <div>
                  <h3 data-i18n="contact.phone">Phone</h3>
                  <a href="tel:+995551624266">+995 551 624 266</a>
                </div>
              </div>

              <div class="contact-info-card" id="info-email">
                <div class="contact-info-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <div>
                  <h3 data-i18n="contact.email">Email</h3>
                  <a href="mailto:trucklogisticsgeorgia@gmail.com">trucklogisticsgeorgia@gmail.com</a>
                </div>
              </div>

              <div class="contact-info-card" id="info-address">
                <div class="contact-info-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <div>
                  <h3 data-i18n="contact.address">Address</h3>
                  <p data-i18n="contact.addressValue">1 Viktor Nozadze Street, Tbilisi, Georgia</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Google Maps -->
    <section class="map-section" id="map" aria-label="Our location on the map">
      <div class="container">
        <div class="section-header reveal">
          <h2 class="section-title" data-i18n="contact.mapTitle">Find Us</h2>
        </div>
        <div class="map-wrapper reveal">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2974.508858449957!2d44.767267090344895!3d41.795797296445706!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40446e77f8945a61%3A0x84eceebb742b4cbd!2zMSDhg5Xhg5jhg6Xhg6Lhg53hg6Ag4YOc4YOd4YOW4YOQ4YOr4YOY4YOhIOGDpeGDo-GDqeGDkCwgVCdiaWxpc2kgMDEzMQ!5e0!3m2!1sen!2sge!4v1775478163199!5m2!1sen!2sge"
            width="100%"
            height="400"
            style="border:0;"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Truck Logistics Georgia location - 1 Viktor Nozadze Street, Tbilisi">
          </iframe>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer" role="contentinfo"></footer>

  <script type="module">
    import { initApp } from '/src/js/main.js';
    initApp('contact');

    // Contact form handler
    const form = document.getElementById('contact-form');
    const success = document.getElementById('form-success');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      // Front-end only — show success message
      success.classList.add('show');
      form.reset();
      setTimeout(() => {
        success.classList.remove('show');
      }, 5000);
    });
  </script>
</body>
</html>
